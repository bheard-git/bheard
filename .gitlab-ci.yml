# GitLab CI for BHeard (Next.js) + Vercel deploy
#
# GitLab → Settings → CI/CD → Variables (masked):
#   VERCEL_TOKEN          — https://vercel.com/account/tokens
#   VERCEL_ORG_ID         — team_J74CBMJ1XANWAyp6qcqAj6vz (or override)
#   VERCEL_PROJECT_ID     — prj_MRAJhuPxXccDF1EdvZFe2GCKOO4k (or override)
#   DATABASE_URL, IMAGEKIT_PRIVATE_KEY, ADMIN_*, AZURE_* or SMTP_*, etc.

stages:
  - test
  - build
  - deploy

default:
  image: node:22-bookworm
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

variables:
  NEXT_TELEMETRY_DISABLED: "1"
  VERCEL_ORG_ID: "team_J74CBMJ1XANWAyp6qcqAj6vz"
  VERCEL_PROJECT_ID: "prj_MRAJhuPxXccDF1EdvZFe2GCKOO4k"

before_script:
  - npm ci

lint:
  stage: test
  script:
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "seo_and_performaceoptimization"

.deploy_vercel:
  stage: deploy
  image: node:22-bookworm
  before_script:
    - npm install -g vercel@latest
  script:
    - vercel pull --yes --environment=$VERCEL_ENV --token=$VERCEL_TOKEN
    - vercel build $VERCEL_BUILD_FLAGS --token=$VERCEL_TOKEN
    - vercel deploy --prebuilt $VERCEL_DEPLOY_FLAGS --token=$VERCEL_TOKEN -m gitlabCommitRef="$CI_COMMIT_REF_NAME" -m gitlabCommitSha="$CI_COMMIT_SHA"
  rules:
    - if: $VERCEL_TOKEN

deploy_preview:
  extends: .deploy_vercel
  variables:
    VERCEL_ENV: preview
    VERCEL_BUILD_FLAGS: ""
    VERCEL_DEPLOY_FLAGS: ""
  rules:
    - if: $VERCEL_TOKEN && $CI_COMMIT_BRANCH != "main"
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
    url: https://bheard-website.vercel.app

deploy_production:
  extends: .deploy_vercel
  variables:
    VERCEL_ENV: production
    VERCEL_BUILD_FLAGS: "--prod"
    VERCEL_DEPLOY_FLAGS: "--prod"
  rules:
    - if: $VERCEL_TOKEN && $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
    url: https://bheard-website.vercel.app
